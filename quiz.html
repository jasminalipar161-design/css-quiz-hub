<!DOCTYPE html>
<html>
<head>
    <title>Basic Parts of Computer Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>
<h1>📝 Basic Parts of Computer Quiz</h1>
<h3 id="questionNumber">Question 1/10</h3>

<p id="question">Which device connects a home network to the Internet?</p>
<button id="choice1" onclick="checkAnswer(this.innerHTML)"></button>

<br><br>

<button id="choice2" onclick="checkAnswer(this.innerHTML)"></button>

<br><br>

<button id="choice3" onclick="checkAnswer(this.innerHTML)"></button>

<br><br>

<button id="choice4" onclick="checkAnswer(this.innerHTML)"></button>

<p id="result"></p>
<br>

<button id="restartBtn" onclick="location.reload()" style="display:none;">
Restart Quiz
</button>
<button id="nextLessonBtn"
onclick="location.href='motherboard-components-quiz.html'"
style="display:none;">
Next Lesson ➜
</button>
<button id="nextQuestionBtn" onclick="nextQuestion()">Next Question</button>
<br><br>
<a href="index.html">
<button>Back to Home</button>
</a>
<script>

let currentQuestion = 1;
let score = 0;
let answered = false;

let correctAnswers = [
"CPU",
"RAM",
"Motherboard",
"Hard Disk Drive",
"Solid State Drive",
"Power Supply Unit",
"Keyboard",
"Monitor",
"Operating System",
"Storage Device"
];


function checkAnswer(answer){

if(answered){
return;
}

answered = true;

if(answer == correctAnswers[currentQuestion - 1]){

score++;

document.getElementById("result").innerHTML =
"<span style='color:green;font-weight:bold;'>✅ Correct!</span>";

}
else{

document.getElementById("result").innerHTML =
"<span style='color:red;font-weight:bold;'>❌ Incorrect!</span>";

}

}


function showChoices(a,b,c,d){

document.getElementById("choice1").innerHTML = a;
document.getElementById("choice2").innerHTML = b;
document.getElementById("choice3").innerHTML = c;
document.getElementById("choice4").innerHTML = d;

}


showChoices(
"CPU",
"RAM",
"Monitor",
"Keyboard"
);


function nextQuestion(){

currentQuestion++;
answered = false;

document.getElementById("result").innerHTML = "";


let question = document.getElementById("question");


if(currentQuestion == 2){

question.innerHTML =
"What component stores temporary data while the computer is running?";

showChoices("RAM","HDD","SSD","Monitor");

}

else if(currentQuestion == 3){

question.innerHTML =
"What is the main board of a computer called?";

showChoices("Motherboard","Keyboard","Mouse","Printer");

}

else if(currentQuestion == 4){

question.innerHTML =
"Which component stores files permanently?";

showChoices("Hard Disk Drive","RAM","CPU","Monitor");

}

else if(currentQuestion == 5){

question.innerHTML =
"Which storage device is faster and uses flash memory?";

showChoices("Solid State Drive","Keyboard","Mouse","Speaker");

}

else if(currentQuestion == 6){

question.innerHTML =
"What supplies power to computer components?";

showChoices("Power Supply Unit","RAM","CPU","Monitor");

}

else if(currentQuestion == 7){

question.innerHTML =
"Which device is used for typing information?";

showChoices("Keyboard","Monitor","Speaker","Printer");

}

else if(currentQuestion == 8){

question.innerHTML =
"Which device displays information from the computer?";

showChoices("Monitor","Mouse","Keyboard","CPU");

}

else if(currentQuestion == 9){

question.innerHTML =
"What software manages computer hardware?";

showChoices("Operating System","Keyboard","RAM","Hard Drive");

}

else if(currentQuestion == 10){

question.innerHTML =
"Which device is used to save files and data?";

showChoices("Storage Device","Input Device","Output Device","Cooling Device");

}


if(currentQuestion == 10){

document.getElementById("choice1").style.display="none";
document.getElementById("choice2").style.display="none";
document.getElementById("choice3").style.display="none";
document.getElementById("choice4").style.display="none";

document.getElementById("questionNumber").innerHTML =
"Quiz Completed!";

question.innerHTML =
"Your Score: " + score + "/10";

document.getElementById("restartBtn").style.display="inline-block";

document.getElementById("nextLessonBtn").style.display="inline-block";

document.getElementById("nextQuestionBtn").style.display="none";

}
else{

document.getElementById("questionNumber").innerHTML =
"Question " + currentQuestion + "/10";

}

}
</script>
</body>
</html>
